<!DOCTYPE html>
<html>
  <head>
    <title>FaceTimey</title>
    <style>
      video {
        width: 45%;
        margin: 5px;
        border: 1px solid black;
      }
      #controls {
        margin: 10px;
      }
      button {
        margin-right: 10px;
        padding: 8px 15px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Simple Video Call</h1>
    <div id="videos"></div>
    <div id="controls">
      <button id="toggleVideo">Turn Camera Off</button>
      <button id="toggleAudio">Mute</button>
      <button id="disconnect">Disconnect Call</button>
      <button id="shareScreen">Share Screen</button>
    </div>
    <div
      id="callStatus"
      style="margin-top: 20px; font-size: 18px; color: red; font-weight: bold"
    ></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const videosContainer = document.getElementById("videos");
      const toggleVideoBtn = document.getElementById("toggleVideo");
      const toggleAudioBtn = document.getElementById("toggleAudio");
      const disconnectBtn = document.getElementById("disconnect");
      const callStatus = document.getElementById("callStatus");
      const shareScreenBtn = document.getElementById("shareScreen");

      let localStream;
      let peerConnections = {}; // Keep track of peer connections
      let roomId;
      let screenStream;
      let isScreenSharing = false;

      const configuration = {
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
      };

      // Initialize media
      async function initMedia() {
        try {
          const constraints = {
            video: {
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
            audio: true,
          };

          localStream = await navigator.mediaDevices.getUserMedia(constraints);
          const localVideo = document.createElement("video");
          localVideo.srcObject = localStream;
          localVideo.autoplay = true;
          localVideo.muted = true;
          localVideo.playsinline = true;
          videosContainer.appendChild(localVideo);
        } catch (e) {
          alert("Could not get user media");
          console.error(e);
        }
      }

      initMedia();

      roomId = prompt("Enter room ID:");
      socket.emit("join-room", roomId);

      // Handle when another user connects to the room
      socket.on("user-connected", (userId) => {
        console.log("User connected:", userId);
        createPeerConnection(userId);
      });

      // Handle signaling (offer, answer, candidate)
      socket.on("signal", async ({ id, signal }) => {
        if (!peerConnections[id]) {
          createPeerConnection(id);
        }

        if (signal.type === "offer") {
          await peerConnections[id].setRemoteDescription(
            new RTCSessionDescription(signal)
          );
          const answer = await peerConnections[id].createAnswer();
          await peerConnections[id].setLocalDescription(answer);
          socket.emit("signal", peerConnections[id].localDescription);
        } else if (signal.type === "answer") {
          await peerConnections[id].setRemoteDescription(
            new RTCSessionDescription(signal)
          );
        } else if (signal.candidate) {
          try {
            await peerConnections[id].addIceCandidate(
              new RTCIceCandidate(signal.candidate)
            );
          } catch (e) {
            console.error("Error adding received ice candidate", e);
          }
        }
      });

      // Handle when another user disconnects
      socket.on("user-disconnected", (userId) => {
        console.log("User disconnected:", userId);
        endCall(userId);
      });

      // Create a new peer connection for a user
      function createPeerConnection(userId) {
        const peerConnection = new RTCPeerConnection(configuration);
        peerConnections[userId] = peerConnection;

        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            socket.emit("signal", { candidate: event.candidate });
          }
        };

        peerConnection.ontrack = (event) => {
          const remoteVideo = document.createElement("video");
          remoteVideo.srcObject = event.streams[0];
          remoteVideo.autoplay = true;
          remoteVideo.playsinline = true;
          videosContainer.appendChild(remoteVideo);
        };

        // Add the local stream to the peer connection
        const streamToAdd = isScreenSharing ? screenStream : localStream;
        streamToAdd.getTracks().forEach((track) => {
          peerConnection.addTrack(track, streamToAdd);
        });

        // If this is the first user (offer), create the offer
        if (Object.keys(peerConnections).length === 1) {
          createOffer(userId);
        }
      }

      // Create an offer to initiate connection with a new user
      async function createOffer(userId) {
        const peerConnection = peerConnections[userId];
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.emit("signal", peerConnection.localDescription);
      }

      // Toggle video
      toggleVideoBtn.onclick = () => {
        if (!localStream) return;
        const videoTrack = localStream.getVideoTracks()[0];
        if (videoTrack.enabled) {
          videoTrack.enabled = false;
          toggleVideoBtn.textContent = "Turn Camera On";
        } else {
          videoTrack.enabled = true;
          toggleVideoBtn.textContent = "Turn Camera Off";
        }
      };

      // Toggle audio
      toggleAudioBtn.onclick = () => {
        if (!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack.enabled) {
          audioTrack.enabled = false;
          toggleAudioBtn.textContent = "Unmute";
        } else {
          audioTrack.enabled = true;
          toggleAudioBtn.textContent = "Mute";
        }
      };

      // Disconnect call
      disconnectBtn.onclick = () => {
        socket.emit("disconnect-call", roomId);
        endCall();
      };

      // End the call for a specific user
      function endCall(userId) {
        if (userId) {
          peerConnections[userId].close();
          delete peerConnections[userId];
        }

        // If there are no active peer connections, disconnect the call
        if (Object.keys(peerConnections).length === 0) {
          callStatus.textContent = "Call Disconnected";
          toggleAudioBtn.disabled = true;
          toggleVideoBtn.disabled = true;
          shareScreenBtn.disabled = true;
        }
      }

      // Start/stop screen sharing
      shareScreenBtn.onclick = async () => {
        if (isScreenSharing) {
          stopScreenSharing();
        } else {
          startScreenSharing();
        }
      };

      async function startScreenSharing() {
        try {
          const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
          if (isMobile) {
            alert("Screen sharing is not supported on mobile browsers.");
            return;
          }

          screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
          });

          // Update the local video element
          localVideo.srcObject = screenStream;
          isScreenSharing = true;
          shareScreenBtn.textContent = "Stop Sharing Screen";

          // Replace the video track for all peer connections
          Object.values(peerConnections).forEach((peerConnection) => {
            peerConnection.getSenders().forEach((sender) => {
              if (sender.track.kind === "video") {
                sender.replaceTrack(screenStream.getVideoTracks()[0]);
              }
            });
          });
        } catch (err) {
          alert("Could not share screen");
          console.error("Error sharing screen:", err);
        }
      }

      function stopScreenSharing() {
        const tracks = screenStream.getTracks();
        tracks.forEach((track) => track.stop());

        // Revert to the local camera stream
        localVideo.srcObject = localStream;
        isScreenSharing = false;
        shareScreenBtn.textContent = "Share Screen";

        // Replace the video track for all peer connections with the local camera video
        Object.values(peerConnections).forEach((peerConnection) => {
          peerConnection.getSenders().forEach((sender) => {
            if (sender.track.kind === "video") {
              sender.replaceTrack(localStream.getVideoTracks()[0]);
            }
          });
        });
      }
    </script>
  </body>
</html>
